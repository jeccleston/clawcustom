services:
  app:
    image: node:20-slim
    working_dir: /app
    volumes:
      - .:/app
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
  
  db:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongodata:
