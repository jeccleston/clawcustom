services:
  api:
    image: python:3.11
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: sleep infinity
    depends_on:
      - db
  
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
