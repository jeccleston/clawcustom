services:
  notebook:
    image: tensorflow/tensorflow:latest-gpu-jupyter
    working_dir: /notebooks
    volumes:
      - .:/notebooks
    ports:
      - "8888:8888"
    command: jupyter notebook --no-browser --allow-root --ip=0.0.0.0 --NotebookApp.token=''
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
