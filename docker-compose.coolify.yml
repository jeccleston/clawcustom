# Coolify Deployment for clawcustom
# Copy this to your Coolify project's docker-compose.yml

services:
  clawcustom:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Persist config and workspace
      - clawcustom-data:/root/.clawcustom
      # Optional: Mount custom config
      # - ./config.json:/root/.clawcustom/config.json:ro
    environment:
      # Required: LLM Provider API Key
      - CLAWCUSTOM__PROVIDERS__OPENROUTER__API_KEY=${OPENROUTER_API_KEY:-}
      - CLAWCUSTOM__PROVIDERS__ANTHROPIC__API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAWCUSTOM__PROVIDERS__DASHSCOPE__API_KEY=${DASHSCOPE_API_KEY:-}
      
      # Optional: Web Search
      - CLAWCUSTOM__TOOLS__WEB__SEARCH__API_KEY=${BRAVE_SEARCH_API_KEY:-}
      
      # Optional: Channel Configs
      - CLAWCUSTOM__CHANNELS__TELEGRAM__ENABLED=${TELEGRAM_ENABLED:-false}
      - CLAWCUSTOM__CHANNELS__TELEGRAM__TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - CLAWCUSTOM__CHANNELS__DISCORD__ENABLED=${DISCORD_ENABLED:-false}
      - CLAWCUSTOM__CHANNELS__DISCORD__TOKEN=${DISCORD_BOT_TOKEN:-}
      
      # Agent Defaults
      - CLAWCUSTOM__AGENTS__DEFAULTS__MODEL=${AI_MODEL:-anthropic/claude-opus-4-5}
      - CLAWCUSTOM__AGENTS__DEFAULTS__PROVIDER=${AI_PROVIDER:-auto}
      - CLAWCUSTOM__AGENTS__DEFAULTS__TEMPERATURE=${AI_TEMPERATURE:-0.1}
      - CLAWCUSTOM__AGENTS__DEFAULTS__MAX_TOKENS=${AI_MAX_TOKENS:-8192}
      
      # Security
      - CLAWCUSTOM__TOOLS__RESTRICT_TO_WORKSPACE=${RESTRICT_TO_WORKSPACE:-true}
    ports:
      - "${GATEWAY_PORT:-18790}:18790"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clawcustom", "status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-1}'
          memory: ${MEMORY_LIMIT:-1G}
        reservations:
          cpus: '${CPU_RESERVATION:-0.25}'
          memory: ${MEMORY_RESERVATION:-256M}

volumes:
  clawcustom-data:
    name: clawcustom-data
